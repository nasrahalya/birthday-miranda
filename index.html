<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Birthday Kak Miranda 🎂🏴‍☠️</title>

  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>
</head>

<body class="main-page">

<!-- PARALLAX -->
<div class="ocean">
  <div class="wave wave-back"></div>
  <div class="wave wave-mid"></div>
  <div class="wave wave-front"></div>
</div>

<div class="ship">⛵</div>

<div class="main-wrapper">

  <div class="top-banner">
    <div class="jolly-custom">☠<span>Miranda Pirates</span></div>
    <h1 class="main-title">Happy Birthday</h1>
    <h2 class="name-title">Kak Miranda! 🎂🥳</h2>
  </div>

  <div class="cake-section">
    <p class="hint-text" id="hintText">🕯️ Klik kue 3x untuk meniup lilin...</p>

    <p class="hint-text hidden" id="scrollHint">
      🎁 Setelah lilin padam, scroll ke bawah ya...
    </p>

    <!-- CAKE -->
    <div class="cake-wrap" onclick="blowCandle()">

      <div class="cake-glow" id="cakeGlow"></div>

      <div class="candles">
        <div class="candle">
          <div class="flame" id="f1"></div>
          <div class="candle-body red"></div>
        </div>

        <div class="candle">
          <div class="flame" id="f2"></div>
          <div class="candle-body gold"></div>
        </div>

        <div class="candle">
          <div class="flame" id="f3"></div>
          <div class="candle-body navy"></div>
        </div>
      </div>

      <div class="cake">
        <div class="cake-top">🍓 ⚓ 🍓</div>
        <div class="cake-mid">Miranda</div>
        <div class="cake-bot"></div>
        <div class="cake-plate"></div>
      </div>
    </div>

  </div>

  <!-- BUTTON -->
  <div class="open-btn-wrap hidden" id="openBtnWrap">
    <a href="yes.html" class="btn-open">💌 Buka Pesannya 💌</a>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
